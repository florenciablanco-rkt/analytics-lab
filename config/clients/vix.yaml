# =============================================================================
# Analytics Lab — configuración de cliente
# =============================================================================
# Cada cliente es un archivo YAML en config/clients/. Para dar de alta uno nuevo,
# copiar este archivo y ajustar los valores. No hace falta tocar código.
# =============================================================================

name: "ViX"

# App del cliente (app_id en postbacks_typed). Vix = iOS.
apps:
  - app_id: "id1531467766"
    label: "iOS"
    platform: "ios"

# Evento de compra / revenue de este cliente (taxonomía propia del MMP).
purchase_event: "cdp_add_on_purchase"
install_event: "install"

# -----------------------------------------------------------------------------
# Suscripción (ViX Premium) — el negocio real
# -----------------------------------------------------------------------------
# El MMP NO trae revenue de suscripción, así que le asignamos un precio.
# Guardamos el precio en MONEDA LOCAL + un tipo de cambio editable → la app
# calcula el revenue estimado en USD. Fuente de precios: ayuda.vix.com.
subscription:
  monthly_event: "cdp_subscribe_monthly"
  annual_event: "cdp_subscribe_annual"

  # ⚠️ FX a verificar (impacta fuerte: MX es ~76% de los suscriptores).
  # Valor = cuántos USD vale 1 unidad de la moneda.
  fx_to_usd:
    USD: 1.0
    MXN: 0.054        # ≈ 18.5 MXN/USD  ← CONFIRMAR con el FX real

  # Precio por país en moneda local (monthly / annual).
  # Países sin entrada usan `default` (referencia USD de app stores).
  default: {currency: "USD", monthly: 5.99, annual: 49.99}
  prices:
    US: {currency: "USD", monthly: 6.99, annual: 84.99}   # plan base Con Anuncios
    PR: {currency: "USD", monthly: 6.99, annual: 84.99}
    MX: {currency: "MXN", monthly: 149.0, annual: 1499.0}
    CO: {currency: "USD", monthly: 5.99, annual: 49.99}   # ~$22.900 COP ≈ $5.99
    AR: {currency: "USD", monthly: 5.99, annual: 49.99}   # ARS muy volátil → ref USD
    # Resto LATAM (cobro en USD vía app stores):
    CL: {currency: "USD", monthly: 5.99, annual: 49.99}
    PE: {currency: "USD", monthly: 5.99, annual: 49.99}
    EC: {currency: "USD", monthly: 5.99, annual: 49.99}
    GT: {currency: "USD", monthly: 5.99, annual: 49.99}
    CR: {currency: "USD", monthly: 5.99, annual: 49.99}
    SV: {currency: "USD", monthly: 5.99, annual: 49.99}
    HN: {currency: "USD", monthly: 5.99, annual: 49.99}
    BO: {currency: "USD", monthly: 5.99, annual: 49.99}
    PA: {currency: "USD", monthly: 5.99, annual: 49.99}
    DO: {currency: "USD", monthly: 5.99, annual: 49.99}
    NI: {currency: "USD", monthly: 5.99, annual: 49.99}
    PY: {currency: "USD", monthly: 5.99, annual: 49.99}
    UY: {currency: "USD", monthly: 5.99, annual: 49.99}
    VE: {currency: "USD", monthly: 5.99, annual: 49.99}

# -----------------------------------------------------------------------------
# Fuente de datos
# -----------------------------------------------------------------------------
# Prioridad por query: Athena (si hay credenciales) > tab del Sheet > snapshot.
# Cada query tiene su propia hoja (gid) en el Google Sheet.
data_source:
  google_sheet_id: "1kbF-bTzxjYmfvih8BjHz-9cvRG14xnulSFrrH1ArTOM"
  queries:
    funnel: {gid: "1253116075"}                                 # Funnel suscripción (semana×país×canal)
    q1: {gid: "1788020183", snapshot: "data/vix_q1_full.csv"}   # Agregado por canal por semana
    q2: {gid: "1564743920"}                                     # Mix UA vs RTG
    q3: {gid: "739123035"}                                      # Evolución semanal
    q4: {gid: "291809667"}                                      # Tasa de repetición
    q5: {gid: "1531089231"}                                     # Journey
    q6: {gid: "1422906474"}                                     # LTV cohorte

# -----------------------------------------------------------------------------
# Normalización de canales (capa 1 del producto)
# -----------------------------------------------------------------------------
# Canales que SON Rocket (para el análisis "Rocket vs. resto").
# rocket_channel_patterns: cualquier canal cuyo nombre CONTENGA alguno de estos
# (case-insensitive) cuenta como Rocket. Confirmado por Flor: lychee y rocket.
rocket_channel_patterns:
  - "lychee"
  - "rocket"
rocket_channels: []
rocket_label: "Rocket Lab"          # los canales de Rocket se muestran fusionados con este nombre

# Canales orgánicos / no pagos (línea base; se excluyen del benchmark de pagos).
organic_channels:
  - "organic"
  - "product_vix"
  - "crm_vix_svod_eml"

# Mapeo de canal crudo -> grupo legible. Lo no mapeado cae en "Otros".
channel_groups:
  rocket:              "Rocket Lab"
  lychee:              "Rocket Lab"      # confirmado: lychee es Rocket
  appgradear424:       "AppGradear"
  googleadwords_int:   "Google"
  dv360_int:           "Google"
  "Apple Search Ads":  "Apple Search Ads"
  tiktokglobal_int:    "TikTok"
  Facebook_Paid:       "Meta"
  Social_facebook:     "Meta"
  Social_instagram:    "Meta"
  Twitter_Paid:        "X (Twitter)"
  entravision:         "Entravision"
  bcnagency:           "BCN Agency"
  miqdigitaluk:        "MiQ"
  organic:             "Orgánico"
  product_vix:         "Orgánico"
